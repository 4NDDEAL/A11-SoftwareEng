name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write           # TODO#0c: Required for OIDC (e.g., Cloud auth)
  issues: write             # TODO#0b: Allow scanners to comment on issues
  pull-requests: write      # TODO#0b: Allow scanners to comment on PRs
  security-events: write    # TODO#0a: Required for SARIF upload to Security tab
  actions: read

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#1: Secret scanners need full history to find secrets in old commits.
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          # TODO#2: Set base + HEAD refs for diff scanning
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}
          # TODO#3: Only report verified secrets to reduce noise
          extra_args: --only-verified

      - name: Run Gitleaks
        # TODO#4: Gitleaks implementation
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  sast-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }} 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#5: Sonar needs history for 'git blame' and new code detection
          fetch-depth: 0

      - name: SonarQube Scan
        # TODO#6: SonarQube Scan implementation
        uses: SonarSource/sonarqube-scan-action@v5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  codeql-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }} 
    strategy:
      matrix:
        # TODO#7: Next.js/React use JS and TS
        language: [ 'javascript-typescript' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # TODO#8: Enable extended security + quality suites
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        # TODO#9: Add analyze step
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scanning:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#10: Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # TODO#11: Install deps for tree resolution
      - name: Install dependencies
        run: npm install

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        id: Depcheck
        with:
          project: 'DontEverPushThisCodeV2'
          path: '.'
          # TODO#12: SARIF for Security Tab
          format: 'SARIF'
          out: 'reports'
          # TODO#13: Fail on High (7.0+)
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload Depcheck SARIF to Security tab
        # TODO#14
        if: always() 
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      - name: Upload Depcheck HTML report
        # TODO#15
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/

  image-scanning:
    runs-on: ubuntu-latest
    needs: [dependency-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#16: Build image
      - name: Build Docker image
        run: docker build -t my-app:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'my-app:latest'
          # TODO#17: Output format
          format: 'sarif'
          output: 'trivy-results.sarif'
          # TODO#18: Severities
          severity: 'HIGH,CRITICAL'
          # TODO#19: Ignore unfixed (optional, but keeps things actionable)
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        # TODO#20
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      - name: Upload Trivy Artifact
        # TODO#21
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif